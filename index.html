<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกของฉัน</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f7f5f0">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">

        <!-- ===== BOTTOM NAVIGATION ===== -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="viewRecord" id="navRecord">
                <i class="fa-solid fa-pen-to-square"></i>
                <span>บันทึก</span>
            </button>
            <button class="nav-btn" data-view="viewHistory" id="navHistory">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>ประวัติ</span>
            </button>
            <button class="nav-btn" id="navSettings">
                <i class="fa-solid fa-gear"></i>
                <span>ตั้งค่า</span>
            </button>
        </nav>

        <!-- ===== VIEW: RECORD ===== -->
        <div id="viewRecord" class="view active">
            <header>
                <h1><i class="fa-solid fa-pen-to-square"></i> บันทึกข้อมูล</h1>
            </header>
            <main>
                <form id="recordForm">

                    <!-- STEP 1: Category buttons -->
                    <div class="form-group">
                        <label class="form-label">
                            <span class="step-badge">1</span> เลือกหัวข้อหลัก
                        </label>
                        <div class="pill-group" id="categoryPills">
                            <div class="loading-text">กำลังโหลด...</div>
                        </div>
                    </div>

                    <!-- STEP 2: Sub-Category buttons -->
                    <div class="form-group slide-in" id="subCategoryGroup" style="display:none;">
                        <label class="form-label">
                            <span class="step-badge">2</span> เลือกหัวข้อย่อย
                        </label>
                        <div class="pill-group" id="subCategoryPills"></div>
                        <input type="hidden" id="subCategorySelected" value="">
                    </div>

                    <!-- Custom sub-category input -->
                    <div class="form-group slide-in" id="customSubCategoryGroup" style="display:none;">
                        <label class="form-label">ระบุหัวข้อย่อยเอง</label>
                        <input type="text" id="customSubCategory" placeholder="พิมพ์หัวข้อย่อยที่ต้องการ...">
                    </div>

                    <!-- Details -->
                    <div class="form-group">
                        <label class="form-label">
                            <span class="step-badge">3</span> รายละเอียด
                        </label>
                        <textarea id="recordDetail" rows="3" placeholder="เขียนรายละเอียดเพิ่มเติม..."></textarea>
                    </div>

                    <!-- Amount -->
                    <div class="form-group">
                        <label class="form-label">จำนวนเงิน (ถ้ามี)</label>
                        <div class="input-money">
                            <span>฿</span>
                            <input type="number" id="recordAmount" placeholder="0.00">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="btnSubmit">
                        <i class="fa-solid fa-cloud-arrow-up"></i> บันทึกข้อมูล
                    </button>
                </form>
                <div id="statusMessage" class="status-message"></div>
            </main>
        </div>

        <!-- ===== VIEW: HISTORY ===== -->
        <div id="viewHistory" class="view">
            <header>
                <h1><i class="fa-solid fa-clock-rotate-left"></i> ประวัติการบันทึก</h1>
                <button id="btnRefreshHistory" class="icon-btn" title="ดึงข้อมูลใหม่">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </header>
            <main>
                <div class="history-list" id="historyList">
                    <div class="empty-state">
                        <i class="fa-solid fa-box-open"></i>
                        <p>ยังไม่มีประวัติ<br>หรือยังไม่ได้เชื่อมต่อ Google Sheets</p>
                    </div>
                </div>
            </main>
        </div>

    </div>

    <!-- ===== MODALS ===== -->

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content text-center success-content">
            <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h2>บันทึกเรียบร้อย!</h2>
            <p id="successDetail">ข้อมูลถูกเก็บลงใน Google Sheets แล้ว</p>
            <button id="btnCloseSuccess" class="primary-btn">ตกลง</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeSettings">&times;</span>
            <h2><i class="fa-solid fa-gear"></i> ตั้งค่าระบบ</h2>

            <div class="tabs">
                <button class="tab-btn active" data-target="tabCategories">จัดการหัวข้อ</button>
                <button class="tab-btn" data-target="tabConfig">Web App URL</button>
            </div>

            <!-- Category Management Tab -->
            <div id="tabCategories" class="tab-content active">
                <div class="category-manager-list" id="categoryManagerList"></div>
                <button id="btnAddNewCategory" class="secondary-btn">
                    <i class="fa-solid fa-plus"></i> เพิ่มหัวข้อหลักใหม่
                </button>
                <div class="modal-actions">
                    <button id="btnSaveCategories" class="primary-btn">บันทึกหมวดหมู่</button>
                </div>
            </div>

            <!-- Web App Config Tab -->
            <div id="tabConfig" class="tab-content">
                <div class="form-group">
                    <label>Google Apps Script Web App URL</label>
                    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
                    <p class="help-text">
                        นำ URL ที่ได้จากการ Deploy Code.gs มาวางที่นี่ 
                        <a href="README.md" target="_blank">อ่านคู่มือ</a>
                    </p>
                </div>
                <div class="modal-actions">
                    <button id="btnSaveConfig" class="primary-btn">บันทึก URL &amp; โหลดข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
